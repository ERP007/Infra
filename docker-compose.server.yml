name: msa-server

services:
  cloudflared:
    image: cloudflare/cloudflared:2026.5.1
    user: "${CLOUDFLARED_UID:-1000}:${CLOUDFLARED_GID:-1000}"
    restart: unless-stopped
    command:
      - tunnel
      - --config
      - /etc/cloudflared/config.yml
      - run
    volumes:
      - ./server-secrets/cloudflared:/etc/cloudflared:ro
    extra_hosts:
      - host.docker.internal:host-gateway
    depends_on:
      - nginx
    networks:
      - msa-server

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - gateway-service
      - keycloak
    ports:
      - "127.0.0.1:80:80"
    volumes:
      - ./nginx/nginx.server.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - msa-server

  frontend:
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_BASE_URL: /api
      NEXT_PUBLIC_API_BASE_URL: /api
      HOST: 0.0.0.0
      PORT: 3000
    command:
      - sh
      - -c
      - |
        set -eu
        if [ ! -x node_modules/.bin/vite ]; then
          npm install
        fi
        npm run dev -- --host 0.0.0.0 --port 3000
    networks:
      - msa-server

  gateway-service:
    build:
      context: ../gateway-service
    restart: unless-stopped
    env_file:
      - ./server-secrets/gateway-service.env
    depends_on:
      user-service:
        condition: service_started
      item-service:
        condition: service_started
      inventory-service:
        condition: service_started
      procurement-service:
        condition: service_started
      sales-service:
        condition: service_started
      keycloak:
        condition: service_started
    networks:
      - msa-server

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.7
    restart: unless-stopped
    env_file:
      - ./server-secrets/keycloak.env
    command:
      - start-dev
      - --http-port=8080
      - --http-relative-path=/keycloak
      - --import-realm
    volumes:
      - ../keycloak/import:/opt/keycloak/data/import:ro
      - keycloak_data:/opt/keycloak/data
    networks:
      - msa-server

  user-service:
    build:
      context: ../user-service
    restart: unless-stopped
    env_file:
      - ./server-secrets/user-service.env
      - ./server-secrets/redis.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - msa-server

  item-service:
    build:
      context: ../item-service
    restart: unless-stopped
    env_file:
      - ./server-secrets/item-service.env
      - ./server-secrets/redis.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - msa-server

  inventory-service:
    build:
      context: ../inventory-service
    restart: unless-stopped
    env_file:
      - ./server-secrets/inventory-service.env
      - ./server-secrets/redis.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - msa-server

  procurement-service:
    build:
      context: ../procurement-service
    restart: unless-stopped
    env_file:
      - ./server-secrets/procurement-service.env
      - ./server-secrets/redis.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - msa-server

  sales-service:
    build:
      context: ../sales-service
    restart: unless-stopped
    env_file:
      - ./server-secrets/sales-service.env
      - ./server-secrets/redis.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - msa-server

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./server-secrets/postgres.env
    ports:
      - "127.0.0.1:15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - msa-server

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    env_file:
      - ./server-secrets/redis.env
    ports:
      - "127.0.0.1:16379:6379"
    command:
      - sh
      - -c
      - |
        if [ -n "$${REDIS_PASSWORD:-}" ]; then
          exec redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}"
        fi
        exec redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$${REDIS_PASSWORD:-}\" ]; then redis-cli -a \"$${REDIS_PASSWORD}\" ping; else redis-cli ping; fi"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - msa-server

networks:
  msa-server:
    name: msa-server

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
  keycloak_data:
