name: msa-local

services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - gateway-service
    ports:
      - "18080:80"
    volumes:
      - ./nginx/nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - msa-local

  frontend:
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_BASE_URL: /api
      NEXT_PUBLIC_API_BASE_URL: /api
      HOST: 0.0.0.0
      PORT: 3000
    command:
      - sh
      - -c
      - |
        set -eu
        if [ ! -x node_modules/.bin/vite ]; then
          npm install
        fi
        if node -e "const p=require('./package.json'); const d={...p.dependencies,...p.devDependencies}; process.exit(d.next ? 0 : 1)" >/dev/null 2>&1; then
          npm run dev -- --hostname 0.0.0.0 --port 3000
        else
          npm run dev -- --host 0.0.0.0 --port 3000
        fi
    networks:
      - msa-local

  gateway-service:
    build:
      context: ../gateway-service
    restart: unless-stopped
    env_file:
      - ./local-secrets/gateway-service.env
    depends_on:
      auth-service:
        condition: service_started
      item-service:
        condition: service_started
      inventory-service:
        condition: service_started
      procurement-service:
        condition: service_started
      sales-service:
        condition: service_started
    networks:
      - msa-local

  auth-service:
    build:
      context: ../auth-service
    restart: unless-stopped
    env_file:
      - ./local-secrets/auth-service.env
      - ./local-secrets/redis.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - msa-local

  item-service:
    build:
      context: ../item-service
    restart: unless-stopped
    env_file:
      - ./local-secrets/item-service.env
      - ./local-secrets/redis.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - msa-local

  inventory-service:
    build:
      context: ../inventory-service
    restart: unless-stopped
    env_file:
      - ./local-secrets/inventory-service.env
      - ./local-secrets/redis.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - msa-local

  procurement-service:
    build:
      context: ../procurement-service
    restart: unless-stopped
    env_file:
      - ./local-secrets/procurement-service.env
      - ./local-secrets/redis.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - msa-local

  sales-service:
    build:
      context: ../sales-service
    restart: unless-stopped
    env_file:
      - ./local-secrets/sales-service.env
      - ./local-secrets/redis.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - msa-local

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./local-secrets/postgres.env
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - msa-local

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    env_file:
      - ./local-secrets/redis.env
    ports:
      - "16379:6379"
    command:
      - sh
      - -c
      - |
        if [ -n "$${REDIS_PASSWORD:-}" ]; then
          exec redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}"
        fi
        exec redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$${REDIS_PASSWORD:-}\" ]; then redis-cli -a \"$${REDIS_PASSWORD}\" ping; else redis-cli ping; fi"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - msa-local

networks:
  msa-local:
    name: msa-local

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
