name: msa-server

x-service-postgres: &service-postgres
  image: postgres:16-alpine
  restart: unless-stopped
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
    interval: 10s
    timeout: 5s
    retries: 10
  networks:
    - data

services:
  cloudflared:
    image: cloudflare/cloudflared:2026.5.1
    user: "${CLOUDFLARED_UID:-1000}:${CLOUDFLARED_GID:-1000}"
    restart: unless-stopped
    command:
      - tunnel
      - --config
      - /etc/cloudflared/config.yml
      - run
    volumes:
      - ./server-secrets/cloudflared:/etc/cloudflared:ro
    extra_hosts:
      - host.docker.internal:host-gateway
    depends_on:
      - nginx
    networks:
      - edge-app
      - edge-ci

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - gateway-service
    ports:
      - "127.0.0.1:80:80"
    volumes:
      - ./nginx/nginx.server.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - edge-app
      - app

  gateway-service:
    build:
      context: ../gateway-service
      dockerfile: ../infra/docker/server-service.Dockerfile
    image: erp007/gateway-service:server
    restart: unless-stopped
    env_file:
      - ./server-secrets/gateway-service.env
    depends_on:
      user-service:
        condition: service_started
      item-service:
        condition: service_started
      inventory-service:
        condition: service_started
      procurement-service:
        condition: service_started
      sales-service:
        condition: service_started
    networks:
      - app
      - service

  user-service:
    build:
      context: ../user-service
      dockerfile: ../infra/docker/server-service.Dockerfile
    image: erp007/user-service:server
    restart: unless-stopped
    env_file:
      - ./server-secrets/user-service.env
      - ./server-secrets/redis.env
    depends_on:
      user-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - service
      - data

  item-service:
    build:
      context: ../item-service
      dockerfile: ../infra/docker/server-service.Dockerfile
    image: erp007/item-service:server
    restart: unless-stopped
    env_file:
      - ./server-secrets/item-service.env
      - ./server-secrets/redis.env
    depends_on:
      item-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - service
      - data

  inventory-service:
    build:
      context: ../inventory-service
      dockerfile: ../infra/docker/server-service.Dockerfile
    image: erp007/inventory-service:server
    restart: unless-stopped
    env_file:
      - ./server-secrets/inventory-service.env
      - ./server-secrets/redis.env
    depends_on:
      inventory-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - service
      - data

  procurement-service:
    build:
      context: ../procurement-service
      dockerfile: ../infra/docker/server-service.Dockerfile
    image: erp007/procurement-service:server
    restart: unless-stopped
    env_file:
      - ./server-secrets/procurement-service.env
      - ./server-secrets/redis.env
    depends_on:
      procurement-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - service
      - data

  sales-service:
    build:
      context: ../sales-service
      dockerfile: ../infra/docker/server-service.Dockerfile
    image: erp007/sales-service:server
    restart: unless-stopped
    env_file:
      - ./server-secrets/sales-service.env
      - ./server-secrets/redis.env
    depends_on:
      sales-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - service
      - data

  user-postgres:
    <<: *service-postgres
    env_file:
      - ./server-secrets/user-postgres.env
    ports:
      - "127.0.0.1:15431:5432"
    volumes:
      - user_postgres_data:/var/lib/postgresql/data

  item-postgres:
    <<: *service-postgres
    env_file:
      - ./server-secrets/item-postgres.env
    ports:
      - "127.0.0.1:15432:5432"
    volumes:
      - item_postgres_data:/var/lib/postgresql/data

  inventory-postgres:
    <<: *service-postgres
    env_file:
      - ./server-secrets/inventory-postgres.env
    ports:
      - "127.0.0.1:15433:5432"
    volumes:
      - inventory_postgres_data:/var/lib/postgresql/data

  procurement-postgres:
    <<: *service-postgres
    env_file:
      - ./server-secrets/procurement-postgres.env
    ports:
      - "127.0.0.1:15434:5432"
    volumes:
      - procurement_postgres_data:/var/lib/postgresql/data

  sales-postgres:
    <<: *service-postgres
    env_file:
      - ./server-secrets/sales-postgres.env
    ports:
      - "127.0.0.1:15435:5432"
    volumes:
      - sales_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    env_file:
      - ./server-secrets/redis.env
    ports:
      - "127.0.0.1:16379:6379"
    command:
      - sh
      - -c
      - |
        if [ -n "$${REDIS_PASSWORD:-}" ]; then
          exec redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}"
        fi
        exec redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$${REDIS_PASSWORD:-}\" ]; then redis-cli -a \"$${REDIS_PASSWORD}\" ping; else redis-cli ping; fi"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - data

networks:
  edge-app:
    name: msa-edge-app
  edge-ci:
    name: msa-edge-ci
  app:
    name: msa-app
  service:
    name: msa-service
  data:
    name: msa-data

volumes:
  user_postgres_data:
  item_postgres_data:
  inventory_postgres_data:
  procurement_postgres_data:
  sales_postgres_data:
  redis_data:
