name: msa-server

x-service-postgres: &service-postgres
  image: postgres:16-alpine
  restart: unless-stopped
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
    interval: 10s
    timeout: 5s
    retries: 10
  networks:
    - data

services:
  cloudflared:
    image: cloudflare/cloudflared:2026.5.1
    user: "${CLOUDFLARED_UID:-1000}:${CLOUDFLARED_GID:-1000}"
    restart: unless-stopped
    command:
      - tunnel
      - --config
      - /etc/cloudflared/config.yml
      - run
    volumes:
      - ./server-secrets/cloudflared:/etc/cloudflared:ro
    extra_hosts:
      - host.docker.internal:host-gateway
    depends_on:
      - nginx
    networks:
      - edge-app
      - edge-ci

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - gateway-service
    ports:
      - "127.0.0.1:80:80"
    volumes:
      - ./nginx/nginx.server.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - edge-app
      - app

  frontend:
    image: ${FRONTEND_REGISTRY:-registry.erp007.xyz/erp007}/frontend:${FRONTEND_IMAGE_TAG:-main}
    restart: unless-stopped
    networks:
      - app

  gateway-service:
    image: ${BACKEND_REGISTRY:-registry.erp007.xyz/erp007}/gateway-service:${GATEWAY_SERVICE_IMAGE_TAG:-main}
    restart: unless-stopped
    env_file:
      - ./server-secrets/gateway-service.env
    depends_on:
      user-service:
        condition: service_started
      item-service:
        condition: service_started
      inventory-service:
        condition: service_started
      procurement-service:
        condition: service_started
      sales-service:
        condition: service_started
    networks:
      - app
      - service

  user-service:
    image: ${BACKEND_REGISTRY:-registry.erp007.xyz/erp007}/user-service:${USER_SERVICE_IMAGE_TAG:-main}
    restart: unless-stopped
    env_file:
      - ./server-secrets/user-service.env
      - ./server-secrets/redis.env
    depends_on:
      user-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - service
      - data
    environment:
      - SPRINGDOC_SWAGGERUI_CONFIGURL=/api/users/v3/api-docs/swagger-config
      - SPRINGDOC_SWAGGERUI_URL=/api/users/v3/api-docs
      - OPENAPI_SERVER_URL=https://erp007.xyz/api

  item-service:
    image: ${BACKEND_REGISTRY:-registry.erp007.xyz/erp007}/item-service:${ITEM_SERVICE_IMAGE_TAG:-main}
    restart: unless-stopped
    env_file:
      - ./server-secrets/item-service.env
      - ./server-secrets/redis.env
      - ./server-secrets/rabbitmq.env
    depends_on:
      item-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - service
      - data
    environment:
      - SPRINGDOC_SWAGGERUI_CONFIGURL=/api/items/v3/api-docs/swagger-config
      - SPRINGDOC_SWAGGERUI_URL=/api/items/v3/api-docs
      - OPENAPI_SERVER_URL=https://erp007.xyz/api

  inventory-service:
    image: ${BACKEND_REGISTRY:-registry.erp007.xyz/erp007}/inventory-service:${INVENTORY_SERVICE_IMAGE_TAG:-main}
    restart: unless-stopped
    env_file:
      - ./server-secrets/inventory-service.env
      - ./server-secrets/redis.env
    depends_on:
      inventory-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - service
      - data
    environment:
      - OPENAPI_SERVER_URL=https://erp007.xyz/api
      - SPRINGDOC_SWAGGERUI_CONFIGURL=/api/inventory/v3/api-docs/swagger-config
      - SPRINGDOC_SWAGGERUI_URL=/api/inventory/v3/api-docs

  procurement-service:
    image: ${BACKEND_REGISTRY:-registry.erp007.xyz/erp007}/procurement-service:${PROCUREMENT_SERVICE_IMAGE_TAG:-main}
    restart: unless-stopped
    env_file:
      - ./server-secrets/procurement-service.env
      - ./server-secrets/redis.env
      - ./server-secrets/rabbitmq.env
    depends_on:
      procurement-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - service
      - data
    environment:
      - SPRINGDOC_SWAGGERUI_CONFIGURL=/api/procurement-orders/v3/api-docs/swagger-config
      - SPRINGDOC_SWAGGERUI_URL=/api/procurement-orders/v3/api-docs
      - OPENAPI_SERVER_URL=https://erp007.xyz/api

  sales-service:
    image: ${BACKEND_REGISTRY:-registry.erp007.xyz/erp007}/sales-service:${SALES_SERVICE_IMAGE_TAG:-main}
    restart: unless-stopped
    env_file:
      - ./server-secrets/sales-service.env
      - ./server-secrets/redis.env
      - ./server-secrets/rabbitmq.env
    depends_on:
      sales-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - service
      - data
    environment:
      - SPRINGDOC_SWAGGERUI_CONFIGURL=/api/sales-orders/v3/api-docs/swagger-config
      - SPRINGDOC_SWAGGERUI_URL=/api/sales-orders/v3/api-docs
      - OPENAPI_SERVER_URL=https://erp007.xyz/api

  user-postgres:
    <<: *service-postgres
    env_file:
      - ./server-secrets/user-postgres.env
    ports:
      - "127.0.0.1:15431:5432"
    volumes:
      - user_postgres_data:/var/lib/postgresql/data

  item-postgres:
    <<: *service-postgres
    env_file:
      - ./server-secrets/item-postgres.env
    ports:
      - "127.0.0.1:15432:5432"
    volumes:
      - item_postgres_data:/var/lib/postgresql/data

  inventory-postgres:
    <<: *service-postgres
    env_file:
      - ./server-secrets/inventory-postgres.env
    ports:
      - "127.0.0.1:15433:5432"
    volumes:
      - inventory_postgres_data:/var/lib/postgresql/data

  procurement-postgres:
    <<: *service-postgres
    env_file:
      - ./server-secrets/procurement-postgres.env
    ports:
      - "127.0.0.1:15434:5432"
    volumes:
      - procurement_postgres_data:/var/lib/postgresql/data

  sales-postgres:
    <<: *service-postgres
    env_file:
      - ./server-secrets/sales-postgres.env
    ports:
      - "127.0.0.1:15435:5432"
    volumes:
      - sales_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    env_file:
      - ./server-secrets/redis.env
    ports:
      - "127.0.0.1:16379:6379"
    command:
      - sh
      - -c
      - |
        if [ -n "$${REDIS_PASSWORD:-}" ]; then
          exec redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}"
        fi
        exec redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$${REDIS_PASSWORD:-}\" ]; then redis-cli -a \"$${REDIS_PASSWORD}\" ping; else redis-cli ping; fi"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - data

  rabbitmq:
    image: rabbitmq:3.13-management
    restart: unless-stopped
    env_file:
      - ./server-secrets/rabbitmq.env
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - service
      - edge-app

  rabbitmq-topology:
    image: rabbitmq:3.13-management
    restart: "no"
    env_file:
      - ./server-secrets/rabbitmq.env
    depends_on:
      rabbitmq:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        rabbitmqadmin \
          --host rabbitmq \
          --port 15672 \
          --username "$${RABBITMQ_DEFAULT_USER}" \
          --password "$${RABBITMQ_DEFAULT_PASS}" \
          import /etc/rabbitmq/definitions.json
    volumes:
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    networks:
      - service

networks:
  edge-app:
    name: msa-edge-app
  edge-ci:
    name: msa-edge-ci
  app:
    name: msa-app
  service:
    name: msa-service
  data:
    name: msa-data

volumes:
  user_postgres_data:
  item_postgres_data:
  inventory_postgres_data:
  procurement_postgres_data:
  sales_postgres_data:
  redis_data:
  rabbitmq_data:
