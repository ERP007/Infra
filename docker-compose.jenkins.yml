name: erp-jenkins

services:
  jenkins:
    build:
      context: ./jenkins
      args:
        DOCKER_GID: ${DOCKER_GID:-983}
    image: erp007-jenkins-controller:local
    container_name: erp-jenkins
    restart: unless-stopped
    ports:
      - "127.0.0.1:18080:8080"
      - "127.0.0.1:50000:50000"
    environment:
      TZ: "Asia/Seoul"
      JENKINS_OPTS: "--httpListenAddress=0.0.0.0"
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=true -Duser.timezone=Asia/Seoul"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/taehyung/apps/msa-server:/home/taehyung/apps/msa-server
    group_add:
      - "${DOCKER_GID:-983}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "registry.erp007.xyz:host-gateway"
    networks:
      - edge-ci

volumes:
  jenkins_home:

networks:
  edge-ci:
    external: true
    name: msa-edge-ci
